# docker-compose.yaml для базы данных разработки
services:
  postgres:
    # Используем alpine-версию, так как она весит в разы меньше и быстрее скачивается
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: docflow_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      # Маппим на /var/lib/postgresql (VOLUME из Dockerfile образа),
      # чтобы Docker не создавал анонимный том для этого пути.
      - pgdata:/var/lib/postgresql
    restart: unless-stopped
  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: docflow_minio
    ports:
      - "9000:9000" # API порт
      - "9001:9001" # Web UI порт
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
volumes:
  pgdata:
  minio_data: