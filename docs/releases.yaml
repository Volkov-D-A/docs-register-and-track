releases:
  - version: 1.0.2
    releasedAt: 2026-04-03
    changes:
      - title: Исправлена сортировка в таблицах
        description: Исправлена сортировка в таблицах документов, теперь документы сортируются корректно от большего к меньшему.
      - title: Изменения в интерфейсе
        description: Добавлена возможность скрытия боковой панели для экономии места на экране.
      - title: Невозможность удаления документов
        description: С целью предотвращения конфликтов нумерации и ссылочной целостности, документы больше не могут быть удалены.
      - title: Улучшена визуализация графов связей документов
        description: Узлы графа выделены цветом для лучшей читаемости, текущий документ выделяется графически рамкой.
  - version: 1.0.1
    releasedAt: 2026-03-29
    changes:
      - title: Изменение полей в карточке регистрации входящего документа
        description: Убраны поля организация получатель и адресат, добавлены поля автор резолюции и исполнители резолюции, поля краткое содержание и содержание объединены в одно поле содержание.
      - title: Изменение полей в карточке регистрации исходящего документа
        description: объединены поля содержание и краткое содержание в одно поле содержание.
      - title: Окно "О программе"
        description: Содержит информацию о текущей версии программы, список изменений в текущей версии, также реализован функционал показа изменений при первом запуске после обновления.
      - title: Блокировка пользователей при множественных попытках входа
        description: Добавлен механизм защиты от подбора пароля, при вводе неверного пароля более 3 раз подряд пользователь блокируется. Блокировка может быть снята только администратором.
      - title: Увеличен шрифт в таблицах
        description: Увеличен шрифт в таблицах документов и поручений для улучшения читаемости.
