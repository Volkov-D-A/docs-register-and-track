releases:
  - version: 1.0.3
    releasedAt: 2026-04-20
    changes:
      - title: Новая модель прав доступа к документам
        description: Документные роли заменены матрицей прав пользователя. Право просмотра теперь может давать полный доступ к виду документа, а доступ к конкретным документам также предоставляется автоматически через номенклатуру подразделения, поручения и ознакомления.
      - title: Участники документооборота выделены отдельно
        description: У пользователей появился отдельный признак участия в документообороте. Это позволяет отделить чистых администраторов от сотрудников, которые могут быть исполнителями поручений, участниками ознакомлений и видеть документы по встроенным каналам доступа.
      - title: Обновлены системные разделы и права
        description: Раздел Справочники вынесен в отдельный пункт меню, добавлены отдельные системные права для справочников и статистики. Статистические показатели перенесены из дашборда в самостоятельный раздел Статистика.
      - title: Улучшена работа карточки документа
        description: Вкладки карточки документа теперь зависят от реальных прав пользователя. Файлы видны всем, кто имеет доступ к самому документу, а права на файлы отвечают только за загрузку и удаление вложений.
      - title: Первичная настройка организации
        description: При первом запуске администратор должен заполнить полное и краткое название организации. Также обновлены значения по умолчанию для ограничений по файлам и разрешенных типов вложений.
      - title: Унифицировано создание связанных документов
        description: В карточке документа две отдельные кнопки создания связанных входящих и исходящих документов заменены одной кнопкой с выбором вида документа в модальном окне. Тип связи теперь определяется общей логикой и готов к расширению новыми видами документов.
  - version: 1.0.2
    releasedAt: 2026-04-03
    changes:
      - title: Исправлена сортировка в таблицах
        description: Исправлена сортировка в таблицах документов, теперь документы сортируются корректно от большего к меньшему.
      - title: Изменения в интерфейсе
        description: Добавлена возможность скрытия боковой панели для экономии места на экране.
      - title: Невозможность удаления документов
        description: С целью предотвращения конфликтов нумерации и ссылочной целостности, документы больше не могут быть удалены.
      - title: Улучшена визуализация графов связей документов
        description: Узлы графа выделены цветом для лучшей читаемости, текущий документ выделяется графически рамкой.
      - title: Доработан механизм поручений
        description: Теперь при завершении поручений ползователь может прикладывать файлы, а при возврате поручения на доработку делопроизводитель должен будет указать причину возврата.
  - version: 1.0.1
    releasedAt: 2026-03-29
    changes:
      - title: Изменение полей в карточке регистрации входящего документа
        description: Убраны поля организация получатель и адресат, добавлены поля автор резолюции и исполнители резолюции, поля краткое содержание и содержание объединены в одно поле содержание.
      - title: Изменение полей в карточке регистрации исходящего документа
        description: объединены поля содержание и краткое содержание в одно поле содержание.
      - title: Окно "О программе"
        description: Содержит информацию о текущей версии программы, список изменений в текущей версии, также реализован функционал показа изменений при первом запуске после обновления.
      - title: Блокировка пользователей при множественных попытках входа
        description: Добавлен механизм защиты от подбора пароля, при вводе неверного пароля более 3 раз подряд пользователь блокируется. Блокировка может быть снята только администратором.
      - title: Увеличен шрифт в таблицах
        description: Увеличен шрифт в таблицах документов и поручений для улучшения читаемости.
