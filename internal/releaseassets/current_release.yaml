version: 1.0.4
releasedAt: "2026-04-27"
changes:
    - title: Обновлены реквизиты входящего письма
      description: Реквизиты корреспондента вынесены в отдельный переиспользуемый блок. В форме можно добавить несколько наборов с регистрационным номером, датой и корреспондентом.
    - title: Резолюции вынесены отдельно
      description: Резолюция, автор и исполнители теперь хранятся в общей таблице документов, а форма входящего письма стала компактнее.
    - title: Добавлены обращения граждан
      description: Появился новый вид документов «Обращения граждан» с отдельным реестром, формой регистрации и поддержкой общих возможностей карточки документа.
    - title: Исправления
      description: Исправлены мелкие недочеты отображения элементов интерфейса.
