version: 1.0.6
releasedAt: "2026-06-05"
changes:
    - title: Проведены технические улучшения кодовой базы
      description: Выполнен небольшой рефакторинг SQL-запросов, доработана обработка ошибок, а также декомпозированы файлы фронтенда и main.go для более удобной поддержки приложения.
    - title: Добавлены персональные события пользователя
      description: В шапке приложения появилась кнопка «События» со списком назначенных поручений, ознакомлений и изменений статусов подконтрольных механизмов для участников документооборота и пользователей с правами контроля.
    - title: Добавлен механизм замещения исполнителей
      description: Участник документооборота может назначить активного пользователя из своего подразделения замещающим на период отсутствия. Замещающий исполняет поручения и подтверждает ознакомления за замещаемого, не становясь первичным адресатом назначений.
    - title: Добавлен административный черновик документа
      description: Администратор может из вкладки номенклатуры создать черновик документа с зарезервированным номером и датой регистрации, включая варианты со сдвигом и литерным номером. Делопроизводитель затем дозаполняет такой документ в обычном реестре.
