version: 1.0.6
releasedAt: "2026-06-05"
changes:
    - title: Проведены технические улучшения кодовой базы
      description: Выполнен небольшой рефакторинг SQL-запросов, доработана обработка ошибок, а также декомпозированы файлы фронтенда и main.go для более удобной поддержки приложения.
    - title: Добавлены персональные события пользователя
      description: В шапке приложения появилась кнопка «События» со списком назначенных поручений, ознакомлений и изменений статусов подконтрольных механизмов для участников документооборота и пользователей с правами контроля.
