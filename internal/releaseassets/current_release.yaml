version: 1.0.4
releasedAt: "2026-04-27"
changes:
    - title: Обновлены реквизиты входящего письма
      description: Исходящий номер отправителя, дата исходящего и организация-отправитель заменены универсальными реквизитами корреспондента — регистрационным номером, датой и корреспондентом. В форме входящего письма можно добавить несколько таких наборов.
    - title: Реквизиты корреспондентов вынесены в общую таблицу
      description: Для документов добавлена отдельная таблица регистрационных реквизитов корреспондентов. Она уже используется во входящих письмах и подготовлена для переиспользования в других видах документов.
    - title: Резолюции вынесены в общую таблицу
      description: Поля резолюции, автора резолюции и исполнителей резолюции больше не хранятся в деталях входящего письма. Для них добавлена отдельная таблица резолюций документов, пригодная для дальнейшего расширения на другие документы.
    - title: Упрощена регистрационная форма входящего письма
      description: Убраны промежуточный номер и промежуточная дата, компактнее оформлен блок реквизитов корреспондента, обновлены отображение карточки, список и фильтры входящих документов.
